<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа | ЦЕХ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { max-width: 800px; margin: 150px auto; padding: 0 20px; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 300px; gap: 60px; }
        .checkout-form h2 { font-size: 40px; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; }

        .checkout-form.anim-reveal-up, .order-summary.anim-reveal-up {
            animation-delay: 0s !important;
            animation-duration: 0.5s;
        }

        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; letter-spacing: 1px; }

        input {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid var(--border); padding: 15px 0;
            color: white; font-size: 16px; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--accent); }

        .order-summary { background: rgba(255,255,255,0.02); padding: 30px; border: 1px solid var(--border); height: fit-content; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .summary-total { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); font-weight: 900; font-size: 24px; color: var(--accent); }

        .btn-pay {
            width: 100%; height: 60px; background: var(--accent); border: none;
            color: white; font-weight: 900; text-transform: uppercase;
            margin-top: 30px; cursor: pointer; transition: 0.3s;
        }
        .btn-pay:hover { background: var(--white); color: var(--dark); }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
    <script src="https://secure.wayforpay.com/server/pay-widget.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Ц<span>Е</span>Х</a>
        </div>
    </header>

    <div class="checkout-container">
        <div class="checkout-grid">
            <div class="checkout-form anim-reveal-up">
                <h2>Ваши данные</h2>
                <form id="order-form">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="user-name" required placeholder="Иван Иванов">
                    </div>
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" id="user-phone" required placeholder="+380">
                    </div>
                    <div class="form-group">
                        <label>Адрес доставки</label>
                        <input type="text" id="user-address" required placeholder="Улица, дом, квартира">
                    </div>
                    <button type="submit" class="btn-pay" id="submit-btn">Оплатить заказ</button>
                </form>
            </div>

            <div class="order-summary anim-reveal-up" style="animation-delay: 0.2s;">
                <h3 style="margin-bottom: 20px; text-transform: uppercase;">Ваш заказ</h3>
                <div id="summary-items"></div>
                <div class="summary-total">
                    ИТОГО: <span id="final-price">0</span> ₴
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ДАННЫЕ КОНФИГУРАЦИИ ---
        const WFP_MERCHANT_LOGIN = 'list_in_ua1'; 
        const TELEGRAM_TOKEN = '8580117432:AAHXM4k56OHxKt5kXRgZrt6q_xAOv1QkMUs'; 
        const TELEGRAM_CHAT_ID = '8321139390';

        let cart = JSON.parse(localStorage.getItem('ceh_cart')) || [];

        function renderCheckout() {
            const summaryItems = document.getElementById('summary-items');
            const finalPrice = document.getElementById('final-price');
            summaryItems.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                summaryItems.innerHTML += `
                    <div class="summary-row" style="align-items: center; margin-bottom: 20px;">
                        <div>
                            <span style="display:block; font-weight:700;">${item.name}</span>
                            <span style="font-size:12px; color:var(--gray);">${item.price} ₴</span>
                        </div>
                        <button onclick="removeFromCart(${index})" style="background:transparent; border:1px solid var(--border); color:var(--accent); padding:5px 10px; cursor:pointer; font-size:10px; font-weight:800;">УДАЛИТЬ</button>
                    </div>`;
            });
            finalPrice.innerText = total;
            if (cart.length === 0) window.location.href = 'delivery.html';
        }

      window.removeFromCart = function(index) {
            cart.splice(index, 1); // Удаляем товар
            
            // Пересчитываем общую сумму
            let newTotal = cart.reduce((sum, item) => sum + item.price, 0);
            
            // Сохраняем обновленные данные
            localStorage.setItem('ceh_cart', JSON.stringify(cart));
            localStorage.setItem('ceh_total', newTotal); 
            
            renderCheckout(); // Перерисовываем чекаут
        }

        // Улучшенная функция отправки
        async function sendToTelegram(name, phone, address) {
            let total = document.getElementById('final-price').innerText;
            let message = `<b>📦 НОВЫЙ ЗАКАЗ (ОЖИДАЕТ ОПЛАТЫ)</b>\n\n`;
            message += `👤 <b>Имя:</b> ${name}\n`;
            message += `📞 <b>Тел:</b> ${phone}\n`;
            message += `📍 <b>Адрес:</b> ${address}\n\n`;
            message += `🛒 <b>Заказ:</b>\n`;
            cart.forEach(item => { message += `- ${item.name} (${item.price} ₴)\n`; });
            message += `\n💰 <b>К ОПЛАТЕ: ${total} ₴</b>`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, parse_mode: 'HTML', text: message })
                });
                return response.ok;
            } catch (error) {
                console.error("Ошибка ТГ:", error);
                return false;
            }
        }

        const wayforpay = new Wayforpay();

        document.getElementById('order-form').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const address = document.getElementById('user-address').value;
            const totalValue = document.getElementById('final-price').innerText;

            btn.innerText = 'ОТПРАВЛЯЕМ ЗАКАЗ...';
            btn.disabled = true;

            // 1. Сначала в ТГ (чтобы заказ не пропал)
            const tgSuccess = await sendToTelegram(name, phone, address);
            
            if (!tgSuccess) {
                alert("Ошибка бота. Проверь токен!");
                btn.disabled = false;
                btn.innerText = 'Оплатить заказ';
                return;
            }

            // Таймер "паники": если через 10 секунд ничего не произошло, разблокируем кнопку
            const panicTimer = setTimeout(() => {
                if (btn.disabled) {
                    btn.disabled = false;
                    btn.innerText = 'Оплатить заказ';
                    console.log("Таймер сработал: виджет не ответил.");
                }
            }, 10000);

            btn.innerText = 'ОЖИДАНИЕ ОПЛАТЫ...';

            try {
                wayforpay.run({
                    merchantAccount: WFP_MERCHANT_LOGIN,
                    merchantDomainName: "ceh.ua",
                    authorizationType: "SimpleSignature",
                    orderReference: "ORDER_" + Date.now(),
                    orderDate: Math.floor(Date.now() / 1000),
                    amount: totalValue.toString(),
                    currency: "UAH",
                    productName: ["Еда ЦЕХ"],
                    productPrice: [totalValue.toString()],
                    productCount: ["1"],
                    clientFirstName: name,
                    clientPhone: phone
                },
                function (response) {
                    clearTimeout(panicTimer);
                    alert('Оплата прошла!');
                    localStorage.clear();
                    window.location.href = 'index.html';
                },
                function (response) {
                    clearTimeout(panicTimer);
                    console.log("WFP Error:", response);
                    alert("Оплата отклонена или окно закрыто. Но заказ уже в Telegram!");
                    btn.innerText = 'Оплатить заказ';
                    btn.disabled = false;
                });
            } catch (err) {
                clearTimeout(panicTimer);
                console.error("Критическая ошибка виджета:", err);
                btn.disabled = false;
                btn.innerText = 'Оплатить заказ';
            }
        };

        renderCheckout();
    </script>
</body>
</html>
