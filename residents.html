<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резиденты | ЦЕХ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .residents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 150px 0 100px;
            content-visibility: auto; 
        }

        .resident-card {
            position: relative;
            height: 450px;
            background: #111; /* Заглушка, пока грузится фото */
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition-func);
            cursor: pointer;
            opacity: 0;
            animation: revealUp 0.6s var(--transition-func) forwards;
            will-change: transform, border-color;
        }

        /* Умная очередь появления без задержек в 3 секунды */
        .resident-card:nth-child(1) { animation-delay: 0.1s; }
        .resident-card:nth-child(2) { animation-delay: 0.2s; }
        .resident-card:nth-child(3) { animation-delay: 0.3s; }
        .resident-card:nth-child(4) { animation-delay: 0.4s; }
        .resident-card:nth-child(5) { animation-delay: 0.5s; }

        .resident-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ТВОЯ ФИШКА: Ч/Б по умолчанию */
        .resident-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.5); /* Черно-белое */
            transition: 0.8s var(--transition-func);
            backface-visibility: hidden;
        }

        /* Цвет при наведении */
        .resident-card:hover .resident-img {
            filter: grayscale(0) brightness(0.8);
            transform: scale(1.05);
        }

        .resident-info {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 40px;
            background: linear-gradient(to top, rgba(10,10,10,0.95), transparent);
            z-index: 2;
        }

        .resident-info h3 {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .resident-tag {
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Ц<span>Е</span>Х</a>
            <nav class="desktop-nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="residents.html" class="nav-link active">Резиденты</a>
                <a href="delivery.html" class="nav-link">Доставка</a>
                <a href="events.html" class="nav-link">Афиша</a>
            </nav>
            <div class="header-actions">
                <button class="btn-outline">B2B</button>
                <a href="booking.html" class="btn-filled">Забронировать</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="residents-grid">
            <div class="resident-card">
                <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=600&auto=format&fit=crop" 
                     class="resident-img" loading="lazy">
                <div class="resident-info">
                    <span class="resident-tag">Мясная кухня</span>
                    <h3>ПРАЙМ БИФ</h3>
                </div>
            </div>

            <div class="resident-card">
                <img src="https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?q=80&w=600&auto=format&fit=crop" 
                     class="resident-img" loading="lazy">
                <div class="resident-info">
                    <span class="resident-tag">Япония</span>
                    <h3>SUSHI DOJO</h3>
                </div>
            </div>

            <div class="resident-card">
                <img src="https://images.unsplash.com/photo-1512152272829-e3139592d56f?q=80&w=600&auto=format&fit=crop" 
                     class="resident-img" loading="lazy">
                <div class="resident-info">
                    <span class="resident-tag">Бургеры</span>
                    <h3>BB & BURGERS</h3>
                </div>
            </div>

            </div>
    </div>
</body>
</html>
